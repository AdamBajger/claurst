apiVersion: v1
kind: Secret
metadata:
  name: {{ include "claurst.secretName" . }}
  labels:
    {{- include "claurst.labels" . | nindent 4 }}
type: Opaque
stringData:
  # SSH public keys allowed to connect to the container.
  # The entrypoint reads this via the AUTHORIZED_KEYS environment variable.
  authorized-keys: {{ required "ssh.authorizedKeys must be set — provide at least one SSH public key" .Values.ssh.authorizedKeys | quote }}
  {{- if .Values.apiKeys.anthropic }}
  anthropic-api-key: {{ .Values.apiKeys.anthropic | quote }}
  {{- end }}
  {{- if .Values.apiKeys.openai }}
  openai-api-key: {{ .Values.apiKeys.openai | quote }}
  {{- end }}
  {{- if .Values.apiKeys.googleAi }}
  google-ai-api-key: {{ .Values.apiKeys.googleAi | quote }}
  {{- end }}
  {{- if .Values.apiKeys.groq }}
  groq-api-key: {{ .Values.apiKeys.groq | quote }}
  {{- end }}
  {{- if .Values.apiKeys.deepseek }}
  deepseek-api-key: {{ .Values.apiKeys.deepseek | quote }}
  {{- end }}
  {{- if .Values.apiKeys.mistral }}
  mistral-api-key: {{ .Values.apiKeys.mistral | quote }}
  {{- end }}
  {{- if .Values.apiKeys.githubToken }}
  github-token: {{ .Values.apiKeys.githubToken | quote }}
  {{- end }}
