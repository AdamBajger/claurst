name: Docker Image

# Triggered automatically when a GitHub Release is published, or manually with
# a release tag so the image can be rebuilt without re-running the full release.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag to pull binaries from (e.g., v0.0.9)'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    name: Build and push Docker image

    steps:
      - uses: actions/checkout@v4

      # ── Resolve the release tag ─────────────────────────────────────────────
      - name: Determine release tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "version=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      # ── Download pre-built Linux binaries from the GitHub Release ───────────
      # The release workflow publishes:
      #   claurst-linux-x86_64.tar.gz  (contains: claurst-linux-x86_64)
      #   claurst-linux-aarch64.tar.gz (contains: claurst-linux-aarch64)
      - name: Download Linux x86_64 binary
        run: |
          TAG="${{ steps.tag.outputs.version }}"
          mkdir -p docker/bin/amd64
          curl -fSL \
            "https://github.com/${{ github.repository }}/releases/download/${TAG}/claurst-linux-x86_64.tar.gz" \
            -o /tmp/claurst-linux-x86_64.tar.gz
          tar -xzf /tmp/claurst-linux-x86_64.tar.gz -C docker/bin/amd64
          # The archive contains a file named after the artifact; rename it.
          mv docker/bin/amd64/claurst-linux-x86_64 docker/bin/amd64/claurst
          chmod +x docker/bin/amd64/claurst

      - name: Download Linux aarch64 binary
        run: |
          TAG="${{ steps.tag.outputs.version }}"
          mkdir -p docker/bin/arm64
          curl -fSL \
            "https://github.com/${{ github.repository }}/releases/download/${TAG}/claurst-linux-aarch64.tar.gz" \
            -o /tmp/claurst-linux-aarch64.tar.gz
          tar -xzf /tmp/claurst-linux-aarch64.tar.gz -C docker/bin/arm64
          mv docker/bin/arm64/claurst-linux-aarch64 docker/bin/arm64/claurst
          chmod +x docker/bin/arm64/claurst

      # ── Docker build toolchain ──────────────────────────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Authenticate to GitHub Container Registry ───────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Generate image tags and OCI labels ─────────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.tag.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.tag.outputs.version }}
            type=raw,value=latest

      # ── Build multi-arch image and push to GHCR ─────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: docker
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
